<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <rect width="1200" height="675" fill="#ffffff"/>
  <text x="60" y="90" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="700" fill="#1F4E79">Summer Cash Flow Checklist</text>
  <text x="60" y="132" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#333333">A simple plan now prevents reactive decisions later.</text>

  <rect x="60" y="170" width="1080" height="430" rx="18" fill="#F7F9FB" stroke="#D9E2EC"/>

  <g font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#222">
    <g transform="translate(110,230)">
      <rect x="0" y="0" width="28" height="28" fill="#ffffff" stroke="#9FB3C8"/>
      <text x="46" y="24">Pull 2–3 years of giving history (weekly or monthly)</text>
    </g>
    <g transform="translate(110,285)">
      <rect x="0" y="0" width="28" height="28" fill="#ffffff" stroke="#9FB3C8"/>
      <text x="46" y="24">Identify your typical dip: start date, depth, recovery</text>
    </g>
    <g transform="translate(110,340)">
      <rect x="0" y="0" width="28" height="28" fill="#ffffff" stroke="#9FB3C8"/>
      <text x="46" y="24">List summer one-time expenses (events, trips, projects)</text>
    </g>
    <g transform="translate(110,395)">
      <rect x="0" y="0" width="28" height="28" fill="#ffffff" stroke="#9FB3C8"/>
      <text x="46" y="24">Decide what spending can pause if giving drops more than expected</text>
    </g>
    <g transform="translate(110,450)">
      <rect x="0" y="0" width="28" height="28" fill="#ffffff" stroke="#9FB3C8"/>
      <text x="46" y="24">Confirm giving link, QR code, and recurring giving option</text>
    </g>
    <g transform="translate(110,505)">
      <rect x="0" y="0" width="28" height="28" fill="#ffffff" stroke="#9FB3C8"/>
      <text x="46" y="24">Schedule 2 short reminders (early + mid-summer)</text>
    </g>
  </g>

  <rect x="740" y="205" width="370" height="130" rx="16" fill="#ffffff" stroke="#D9E2EC"/>
  <text x="765" y="245" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#2E8B57">Quick win</text>
  <text x="765" y="275" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#333">Move non-urgent purchases</text>
  <text x="765" y="302" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#333">out of your historically low weeks.</text>
</svg>
