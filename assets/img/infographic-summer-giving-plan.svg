<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" fill="none">
  <rect width="1200" height="760" rx="28" fill="#ffffff"/>
  <text x="88" y="108" fill="#16202A" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800">A simple summer giving plan</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="82" y="168" width="312" height="460" rx="24" fill="#FFF8EE" stroke="#E9D8BD"/>
    <text x="122" y="236" fill="#16202A" font-size="32" font-weight="800">1. Forecast</text>
    <text x="122" y="290" fill="#536070" font-size="22">Use last year’s giving, attendance, and large-gift timing to estimate the likely dip.</text>
    <rect x="444" y="168" width="312" height="460" rx="24" fill="#F7FAFC" stroke="#D9E3EC"/>
    <text x="484" y="236" fill="#16202A" font-size="32" font-weight="800">2. Strengthen</text>
    <text x="484" y="290" fill="#536070" font-size="22">Make recurring giving easy and visible before people disappear into summer travel.</text>
    <rect x="806" y="168" width="312" height="460" rx="24" fill="#16202A"/>
    <text x="846" y="236" fill="#FFF8EE" font-size="32" font-weight="800">3. Communicate</text>
    <text x="846" y="290" fill="#D7E0E8" font-size="22">Tell the story of what ongoing generosity supports. Keep it calm, clear, and mission-first.</text>
  </g>
  <path d="M394 398H444" stroke="#E8A54B" stroke-width="8" stroke-linecap="round"/>
  <path d="M756 398H806" stroke="#E8A54B" stroke-width="8" stroke-linecap="round"/>
</svg>
